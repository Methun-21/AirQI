<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRAWARE | Predictive Micro-Zoning Engine</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Leaflet & Charts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        /* Small overrides for Leaflet popups to match premium theme */
        .leaflet-popup-content-wrapper {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            border-radius: 16px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3) !important;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .leaflet-popup-tip {
            background: rgba(255, 255, 255, 0.95) !important;
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <div id="map_container"></div>

    <!-- LEFT PANEL: Control Engine -->
    <div id="control_panel" class="glass-panel">
        <div class="branding">
            <div class="branding-logo">
                <i class="fas fa-layer-group"></i>
                <h2>AIRAWARE</h2>
            </div>
            
            <!-- NEW: Government vs Citizen Toggle -->
            <div class="view-toggle">
                <div id="toggle-citizen" class="view-toggle-option active" onclick="setViewMode('citizen')">CITIZEN</div>
                <div id="toggle-admin" class="view-toggle-option" onclick="setViewMode('admin')">ADMIN</div>
            </div>
        </div>

        <div class="section">
            <label><i class="fas fa-location-arrow"></i> Origin Node</label>
            <div class="input-group">
                <select id="start">
                    <option value="Connaught Place">Connaught Place</option>
                    <option value="Karol Bagh">Karol Bagh</option>
                    <option value="Chandni Chowk">Chandni Chowk</option>
                    <option value="Dwarka">Dwarka</option>
                    <option value="Saket">Saket</option>
                    <option value="Rohini">Rohini</option>
                    <option value="Lajpat Nagar">Lajpat Nagar</option>
                    <option value="Mayur Vihar">Mayur Vihar</option>
                    <option value="Vasant Kunj">Vasant Kunj</option>
                    <option value="Delhi University">Delhi University</option>
                    <option value="India Gate">India Gate</option>
                </select>
            </div>

            <label><i class="fas fa-map-marker-alt"></i> Destination Node</label>
            <div class="input-group">
                <select id="end">
                    <option value="Anand Vihar">Anand Vihar (Testing Hotspot)</option>
                    <option value="Karol Bagh">Karol Bagh</option>
                    <option value="Connaught Place">Connaught Place</option>
                    <option value="Saket">Saket</option>
                    <option value="Vasant Kunj">Vasant Kunj</option>
                    <option value="Dwarka">Dwarka</option>
                    <option value="Rohini">Rohini</option>
                </select>
            </div>

            <button class="primary-btn" onclick="getRoute()">
                <i class="fas fa-satellite-dish"></i>
                Run Clean Route Inference
            </button>

            <!-- Box to show the comparison of routes -->
            <div id="route-comparison-box" style="margin-top: 20px; display: none; gap: 12px; flex-direction: column;">
                <!-- Cards injected via JS -->
            </div>
        </div>

        <div class="section" style="margin-top: 10px; border-top: 1px solid var(--glass-border); padding-top: 24px;">
            <h4 style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 16px; display:flex; align-items:center; gap:8px;">
                <i class="fas fa-heartbeat" style="color:var(--accent);"></i> Personal Health Engine
            </h4>
            <div style="display: flex; gap: 12px;">
                <div style="flex: 1;">
                    <label>Age Profile</label>
                    <input type="number" id="age" value="25">
                </div>
                <div style="flex: 1;">
                    <label>Asthma Risk</label>
                    <div class="custom-checkbox-wrapper">
                        <input type="checkbox" id="asthma">
                    </div>
                </div>
            </div>
            <button class="primary-btn" onclick="getHealthAdvice()" style="margin-top:16px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-primary); box-shadow: none;">
                <i class="fas fa-clipboard-list" style="color: var(--accent);"></i> Generate Med-Advice
            </button>
        </div>
    </div>

    <!-- RIGHT DASHBOARD: Analytics -->
    <div id="sidebar" class="glass-panel">
        <div class="branding" style="margin-bottom: 20px;">
            <h3 style="display:flex; align-items:center; gap:10px; font-size:1.2rem; font-weight:800; color:var(--text-primary);">
                <i class="fas fa-chart-network" style="color:var(--accent);"></i> Live Telemetry
            </h3>
        </div>

        <div class="dashboard-card">
            <h4><i class="fas fa-broadcast-tower"></i> Sensor Network Matrix</h4>
            <div style="height: 160px; position: relative; margin-top: 16px;">
                <canvas id="aqiBarChart"></canvas>
            </div>
        </div>

        <div class="dashboard-card">
            <h4><i class="fas fa-lungs"></i> Exposure Impact Simulator</h4>
            <div style="margin-top: 16px;">
                <label>Daily Outdoor Duration (Hours)</label>
                <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                    <input type="range" id="sim-hours" min="1" max="12" value="2" oninput="document.getElementById('hr-val').innerText = this.value" style="padding:0; height:4px; background:rgba(255,255,255,0.2); appearance:auto;">
                    <span style="font-weight:700; color:var(--accent); min-width:40px; text-align:right;"><span id="hr-val">2</span>h</span>
                </div>

                <label>Primary Exposure Zone</label>
                <select id="sim-location" style="margin-bottom: 20px;">
                    <option value="Connaught Place">Connaught Place</option>
                    <option value="Anand Vihar">Anand Vihar</option>
                    <option value="Dwarka">Dwarka</option>
                </select>

                <button class="primary-btn" onclick="simulateExposure()" style="padding:12px; font-size:0.9rem;">
                    <i class="fas fa-vial"></i> Run Simulation
                </button>
                
                <div id="sim-result"></div>
                
                <div style="height: 140px; margin-top: 20px;">
                    <canvas id="simulator-chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- CHATBOT -->
    <button id="chat-button" onclick="toggleChatbot()">
        <i class="fas fa-robot"></i>
    </button>

    <div id="chatbot" class="glass-panel">
        <div id="chat-header">
            <span style="display:flex; align-items:center; gap:10px;"><i class="fas fa-bolt" style="color:var(--accent);"></i> AirBot Core</span>
            <i class="fas fa-times" onclick="toggleChatbot()" style="cursor:pointer; color:var(--text-secondary); transition:0.3s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--text-secondary)'"></i>
        </div>
        <div id="chat-messages">
            <div class="msg bot-msg">System Online. I am the AIRAWARE neural assistant. Ask me about micro-climate forecasting, routing, or health impacts.</div>
        </div>
        <div id="chat-input-area">
            <input id="chat-input" type="text" placeholder="Query system..." style="padding: 12px 16px;">
            <button id="chat-send" onclick="sendMessage()"><i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <!-- Main JS Logic -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
