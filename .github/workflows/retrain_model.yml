name: Continuous Training (MLOps Retraining)

on:
  schedule:
    # Run at 00:00 every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  retrain-model:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install matplotlib seaborn shap # Added for the evaluation script

      - name: Run ML Training Pipeline
        run: |
          echo "Starting Automated Model Retraining..."
          python train_model.py
          echo "Training Complete."

      - name: Run Accuracy Evaluation
        run: |
          echo "Generating new accuracy metrics and plots..."
          python evaluate_accuracy.py || echo "Evaluation script skipped/failed, but training succeeded."

      - name: Commit and Push Updated Models
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add models/*.pkl
          git add accuracy_report.txt || true
          git add accuracy_plot.png || true
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit (Models are identical)"
          else
            git commit -m "🤖 MLOps: Automated Model Retraining & Accuracy Update"
            git push
          fi
